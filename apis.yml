aid: pwc
name: PwC
description: >-
  PricewaterhouseCoopers (PwC) is one of the Big Four professional services
  firms providing audit and assurance, tax, and management consulting services
  globally. PwC operates as a network of member firms across approximately 150
  countries with hundreds of thousands of professionals. Service lines include
  audit, deals and transactions, tax compliance and advisory, risk assurance,
  cybersecurity and privacy, ESG and sustainability assurance, workforce
  transformation, and digital/technology consulting (cloud, data, AI, ERP).
  PwC publishes thought-leadership content and operates client portals for
  engagement delivery and document exchange, but it does not publish a public
  developer API or open partner integration portal at the corporate level -
  client connectivity is bilateral and project-scoped rather than offered as
  a self-serve API product.
